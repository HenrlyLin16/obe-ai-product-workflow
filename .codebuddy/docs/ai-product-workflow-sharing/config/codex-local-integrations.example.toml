# Codex local MCP / Skill integration example for OBE AI product workflow.
# Copy selected sections into ~/.codex/config.toml.
# Keep secrets in environment variables. Never commit real tokens.


# Beginner note:
# Lark/Figma/Vercel are advanced integrations. First verify manual copy/paste
# workflow works, then enable only the MCP server you need.
# AI API credentials are normally read from your shell environment:
#   export ANTHROPIC_BASE_URL="https://ai.1bullex.com/api"
#   export ANTHROPIC_AUTH_TOKEN="示例 Token"

[features]
rmcp_client = true

[mcp_servers.notion]
url = "https://mcp.notion.com/mcp"

[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"
bearer_token_env_var = "FIGMA_OAUTH_TOKEN"
http_headers = { "X-Figma-Region" = "us-east-1" }

# Optional local Figma developer MCP.
# [mcp_servers.figma-developer]
# command = "npx"
# args = ["-y", "figma-developer-mcp"]
# env = { FIGMA_API_KEY = "$FIGMA_API_KEY" }

