  "device_start_hints": ["logged-in", "futures-tab-reachable"],
  "steps": [
    {"name": "open_futures_tab", "action": "tap", "selector": {"desc": "tab-futures", "text": "合约", "fallback": [600, 2480]}, "snapshot": true, "failure_category": "automation_issue"},
