{
  "name": "watch-monitor-cross-page",
  "version": 1,
  "requires_device_unlocked": true,
  "requires_vpn": true,
  "required_external_apps": ["com.follow.clash"],
  "device_start_hints": ["logged-in", "watch-monitor-already-enabled", "overlay-permission-enabled"],
  "steps": [
    {
      "name": "current_app_overlay_checkpoint",
      "action": "ux_snapshot",
      "label": "watch-monitor-current-app-overlay",
      "snapshot": true,
      "failure_category": "environment_blocker"
    },
    {
      "name": "go_home_keyevent",
      "action": "keyevent",
      "keycode": "KEYCODE_HOME",
      "snapshot": true,
      "failure_category": "environment_blocker"
    },
    {
      "name": "home_overlay_checkpoint",
      "action": "ux_snapshot",
      "label": "watch-monitor-home-overlay",
      "snapshot": true,
      "continue_on_failure": true,
      "failure_category": "requirement_unclear"
    },
    {
      "name": "open_vpn_app",
      "action": "open_external_app",
      "package": "com.follow.clash",
      "snapshot": true,
      "failure_category": "automation_issue"
    },
    {
      "name": "vpn_overlay_checkpoint",
      "action": "ux_snapshot",
      "label": "watch-monitor-vpn-overlay",
      "snapshot": true,
      "continue_on_failure": true,
      "failure_category": "requirement_unclear"
    },
    {
      "name": "relaunch_onebullex",
      "action": "launch_app",
      "package": "com.onemore.onebullex.dev",
      "activity": "com.icy.neptune.MainActivity",
      "snapshot": true,
      "failure_category": "automation_issue"
    },
    {
      "name": "assert_onebullex_foreground",
      "action": "ensure_foreground",
      "package": "com.onemore.onebullex.dev",
      "failure_category": "environment_blocker"
    },
    {
      "name": "return_to_app_checkpoint",
      "action": "ux_snapshot",
      "label": "watch-monitor-returned-to-app",
      "snapshot": true,
      "failure_category": "environment_blocker"
    }
  ]
}
