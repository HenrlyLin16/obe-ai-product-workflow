{
  "name": "smoke",
  "version": 1,
  "requires_device_unlocked": true,
  "device_start_hints": ["app-foreground-or-launchable", "logged-in-home-or-assets-visible"],
  "steps": [
    {
      "name": "initial_screen_responsive",
      "action": "assert_text",
      "any": ["首页", "市场", "合约", "现货", "总览", "资金", "总资产价值"],
      "snapshot": true,
      "failure_category": "environment_blocker"
    }
  ]
}
