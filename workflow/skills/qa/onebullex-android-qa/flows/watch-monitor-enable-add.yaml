{
  "name": "watch-monitor-enable-add",
  "version": 1,
  "requires_device_unlocked": true,
  "device_start_hints": ["logged-in", "kline-route-reachable", "overlay-permission-preferred"],
  "steps": [
    {
      "name": "open_home_contract_entry",
      "action": "tap",
      "route": "watch_monitor.bottom_tab_futures",
      "wait": 1.8,
      "snapshot": true,
      "failure_category": "environment_blocker"
    },
    {
      "name": "assert_contract_page",
      "action": "assert_text",
      "all": ["开仓", "平仓", "K线图"],
      "snapshot": true,
      "failure_category": "environment_blocker"
    },
    {
      "name": "open_kline_page",
      "action": "tap",
      "route": "watch_monitor.contract_kline_tab",
      "snapshot": true,
      "failure_category": "automation_issue"
    },
    {
      "name": "open_settings_sheet",
      "action": "tap",
      "route": "watch_monitor.kline_settings_button",
      "snapshot": true,
      "failure_category": "automation_issue"
    },
    {
      "name": "open_watch_monitor_page",
      "action": "tap",
      "route": "watch_monitor.settings_watch_monitor_entry",
      "snapshot": true,
      "failure_category": "automation_issue"
    },
    {
      "name": "enable_watch_monitor",
      "action": "tap",
      "route": "watch_monitor.manage_toggle",
      "snapshot": true,
      "failure_category": "automation_issue"
    },
    {
      "name": "open_add_pair_sheet",
      "action": "tap",
      "route": "watch_monitor.bottom_add_pair_cta",
      "snapshot": true,
      "failure_category": "automation_issue"
    },
    {
      "name": "assert_add_pair_sheet",
      "action": "assert_text",
      "all": ["合约", "现货", "BTCUSDT 永续"],
      "snapshot": true,
      "bug_candidate": true,
      "failure_category": "product_bug"
    },
    {
      "name": "select_first_contract_pair",
      "action": "tap",
      "route": "watch_monitor.first_contract_pair_checkbox",
      "snapshot": true,
      "failure_category": "automation_issue"
    },
    {
      "name": "assert_float_appeared_during_sheet",
      "action": "ux_snapshot",
      "label": "watch-monitor-float-during-add-sheet",
      "snapshot": true,
      "continue_on_failure": true,
      "failure_category": "requirement_unclear"
    },
    {
      "name": "close_add_pair_sheet",
      "action": "tap_xy",
      "route": "watch_monitor.add_sheet_back_or_close",
      "snapshot": true,
      "failure_category": "automation_issue"
    },
    {
      "name": "assert_pair_added_to_list",
      "action": "assert_text",
      "all": ["BTCUSDT 永续", "置顶", "拖动"],
      "snapshot": true,
      "bug_candidate": true,
      "failure_category": "product_bug"
    }
  ]
}
