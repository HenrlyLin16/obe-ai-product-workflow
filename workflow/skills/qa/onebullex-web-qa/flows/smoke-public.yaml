{
  "name": "smoke-public",
  "version": 1,
  "description": "Public zh-cn homepage smoke.",
  "test_level": "L1",
  "risk_level": "low",
  "required_runtime": "playwright",
  "side_effect_level": "none",
  "oracle_type": [
    "dom"
  ],
  "requires_clash_vpn": false,
  "requires_system_proxy": false,
  "requires_traffic_gt_0kb": false,
  "recording_seeded": false,
  "manual_oracle_required": false,
  "base_url": "https://testnet.1bullex.com/",
  "browser_mode": "iab",
  "locale": "zh-cn",
  "viewport": "desktop",
  "required_account_profile": "guest",
  "required_start_state": "public",
  "requires_health_gate": false,
  "side_effects": "none",
  "public_only": true,
  "steps": [
    {
      "name": "open_home",
      "action": "goto",
      "url": "/",
      "snapshot": true,
      "failure_category": "environment_blocker"
    },
    {
      "name": "ensure_chinese_locale",
      "action": "ensure_locale",
      "signals": [
        "登录",
        "市场",
        "合约",
        "现货"
      ],
      "failure_category": "product_bug",
      "bug_candidate": true
    },
    {
      "name": "core_nav_visible",
      "action": "assert_text",
      "any": [
        "市场",
        "合约",
        "现货",
        "登录"
      ],
      "snapshot": true,
      "failure_category": "product_bug",
      "bug_candidate": true
    }
  ]
}
