{
  "name": "futures-trade-dry-run",
  "version": 1,
  "description": "Futures order form path to final confirmation, no default submit.",
  "test_level": "L3",
  "risk_level": "critical",
  "required_runtime": "codex",
  "side_effect_level": "dry_run",
  "oracle_type": [
    "dom",
    "negative",
    "state"
  ],
  "requires_clash_vpn": true,
  "requires_system_proxy": true,
  "requires_traffic_gt_0kb": true,
  "recording_seeded": false,
  "manual_oracle_required": false,
  "base_url": "https://testnet.1bullex.com/",
  "browser_mode": "chrome",
  "locale": "zh-cn",
  "viewport": "desktop",
  "required_account_profile": "funded-futures",
  "required_start_state": "logged-in-funded-futures",
  "requires_health_gate": true,
  "side_effects": "blocked-by-default",
  "public_only": false,
  "steps": [
    {
      "name": "open_futures",
      "action": "goto",
      "route": "trade.futures_page",
      "snapshot": true,
      "failure_category": "environment_blocker"
    },
    {
      "name": "price_input_visible",
      "action": "assert_visible",
      "route": "trade.price_input",
      "failure_category": "product_bug",
      "bug_candidate": true
    },
    {
      "name": "qty_input_visible",
      "action": "assert_visible",
      "route": "trade.qty_input",
      "failure_category": "product_bug",
      "bug_candidate": true
    },
    {
      "name": "long_button_visible",
      "action": "assert_visible",
      "route": "trade.open_long_btn",
      "failure_category": "product_bug",
      "bug_candidate": true
    },
    {
      "name": "short_button_visible",
      "action": "assert_visible",
      "route": "trade.open_short_btn",
      "failure_category": "product_bug",
      "bug_candidate": true
    },
    {
      "name": "stop_before_submit",
      "action": "safety_gate",
      "reason": "Futures final submit requires explicit testnet approval.",
      "requires_side_effect": true,
      "requires_confirm_submit": true,
      "failure_category": "environment_blocker"
    }
  ]
}
