{
  "feature": "withdraw",
  "version": 1,
  "elements": {
    "withdraw_page": {"description":"Withdraw page","stability":"text","url":"/zh-cn/asset?tab=Withdraw","selector":{"testid":"withdraw-page","text_regex":"提币|Withdraw|链上提币|提币地址"}},
    "address_input": {"description":"Withdraw address input","stability":"fallback","needs_test_id":true,"selector":{"testid":"withdraw-address-input","css":"input[placeholder*=提现地址], input[placeholder*=地址], input[placeholder*=Address], input[name*=address], .Input_input__leG08","text_regex":"提币地址|Address"}},
    "address_book_icon": {"description":"Address book icon or entry button","stability":"fallback","needs_test_id":true,"selector":{"testid":"withdraw-address-book-entry","css":"button[title='地址簿'], .withdraw_addressBookBtn__KeCni, button[class*=addressBook], button[class*=address-book]","text_regex":"地址簿|Address Book|常用地址"}},
    "address_dropdown": {"description":"Address dropdown/list under input","stability":"fallback","needs_test_id":true,"selector":{"testid":"withdraw-address-dropdown","css":"[class*=dropdown], [class*=menu], [class*=address-list]","text_regex":"当前网络暂无常用地址|添加地址|免验证|不可用|选用"}},
    "empty_address_hint": {"description":"No saved address hint for current network","stability":"text","selector":{"text_regex":"当前网络暂无常用地址|暂无常用地址"}},
    "add_address_cta": {"description":"Add address CTA in withdraw page or empty state","stability":"text","needs_test_id":true,"selector":{"testid":"withdraw-add-address","text_regex":"添加地址|新增地址|Add Address"}},
    "save_to_address_book_checkbox": {"description":"Save-to-address-book checkbox","stability":"text","needs_test_id":true,"selector":{"testid":"save-to-address-book-checkbox","text_regex":"添加到地址簿|加入地址簿"}},
    "remark_input": {"description":"Optional remark input","stability":"fallback","needs_test_id":true,"selector":{"testid":"withdraw-remark-input","css":"input[placeholder*=备注], textarea[placeholder*=备注], input[placeholder*=Remark]","text_regex":"备注|Remark"}},
    "address_book_page": {"description":"Address book full page or modal","stability":"text","selector":{"testid":"address-book-page","css":"[class*=addressBook], [class*=AddressBook]","text_regex":"提币地址簿|地址簿|Address Book|常用地址"}},
    "all_tab": {"description":"All networks tab","stability":"text","selector":{"testid":"address-book-tab-all","text_regex":"全部|All"}},
    "network_tab": {"description":"Network tab row","stability":"fallback","needs_test_id":true,"selector":{"testid":"address-book-network-tab","css":"[role=tab], [class*=tab]","text_regex":"网络|TRC20|ERC20|BEP20|Arbitrum|Polygon|Base"}},
    "address_row": {"description":"Address row/card","stability":"fallback","needs_test_id":true,"selector":{"testid":"address-book-row","css":"[class*=address-card], [class*=address-row], [class*=list-item]","text_regex":"免验证|不可用|选用|编辑|删除"}},
    "use_button": {"description":"Use/select address button","stability":"text","needs_test_id":true,"selector":{"testid":"address-book-use-button","text_regex":"选用|选择|Use"}},
    "edit_button": {"description":"Edit remark button","stability":"text","needs_test_id":true,"selector":{"testid":"address-book-edit-button","text_regex":"编辑|Edit|修改"}},
    "save_button": {"description":"Save button","stability":"text","needs_test_id":true,"selector":{"testid":"address-book-save-button","css":"button[type='submit'], button[class*=save], button[class*=primary]","text_regex":"保存|Save"}},
    "address_required_error": {"description":"Required validation for empty address field","stability":"text","selector":{"text_regex":"请输入地址"}},
    "delete_button": {"description":"Delete button","stability":"text","needs_test_id":true,"selector":{"testid":"address-book-delete-button","text_regex":"删除|Delete"}},
    "confirm_delete": {"description":"Delete confirm button","stability":"text","needs_test_id":true,"selector":{"testid":"address-book-delete-confirm","text_regex":"确认删除|确认|Delete|Confirm"}},
    "cancel_button": {"description":"Cancel button","stability":"text","needs_test_id":true,"selector":{"testid":"address-book-cancel-button","text_regex":"取消|Cancel|返回|Back"}},
    "unavailable_tag": {"description":"Unavailable tag","stability":"text","selector":{"text_regex":"不可用|Disabled"}},
    "whitelist_tag": {"description":"Whitelist/no-verification tag","stability":"text","selector":{"text_regex":"免验证|Whitelist|No verification"}},
    "network_select": {"description":"Network select field","stability":"fallback","needs_test_id":true,"selector":{"testid":"address-book-network-select","css":"select, [role=combobox]","text_regex":"网络|Network"}},
    "twofa_dialog": {"description":"Security verification dialog","stability":"text","selector":{"testid":"security-verify-dialog","text_regex":"安全验证|验证码|谷歌验证码|邮箱验证码|Google Authenticator"}},
    "toast_error_duplicate": {"description":"Duplicate address toast","stability":"text","selector":{"text_regex":"已在.*添加过相同地址，请勿重复添加"}},
    "toast_error_code": {"description":"Verification code error toast","stability":"text","selector":{"text_regex":"验证码填写错误，请重新输入|安全项验证码填写错误，请重新输入"}},
    "toast_create_success": {"description":"Create success toast","stability":"text","selector":{"text_regex":"新增常用地址成功|操作成功"}},
    "toast_delete_success": {"description":"Delete success toast","stability":"text","selector":{"text_regex":"地址已删除"}},
    "toast_delete_fail": {"description":"Delete fail toast","stability":"text","selector":{"text_regex":"删除失败，请稍后重试"}},
    "toast_save_fail": {"description":"Save fail toast","stability":"text","selector":{"text_regex":"保存失败，请稍后重试"}},
    "toast_network_disabled": {"description":"Unavailable network select toast","stability":"text","selector":{"text_regex":"当前地址所属网络暂不支持提币"}}
  }
}
